<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Prediction System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; }
        label { margin-top: 10px; display: block; }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #218838; }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9f7ef;
            border: 1px solid #28a745;
            border-radius: 4px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #155724;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Loan Prediction System</h1>

    <!-- method=POST sends data to Flask, action=/predict is the Flask route -->
    <form method="POST" action="/predict">

        <label>Gender</label>
        <select name="Gender">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <label>Married</label>
        <select name="Married">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Dependents</label>
        <select name="Dependents">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4+</option>
        </select>

        <label>Education</label>
        <select name="Education">
            <option value="1">Graduate</option>
            <option value="0">Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select name="Self_Employed">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome" placeholder="e.g. 5000" required>

        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome" placeholder="e.g. 0" required>

        <label>Loan Amount (in thousands)</label>
        <input type="number" name="LoanAmount" placeholder="e.g. 150" required>

        <label>Loan Amount Term (in months)</label>
        <input type="number" name="Loan_Amount_Term" placeholder="e.g. 360" required>

        <label>Credit History</label>
        <select name="Credit_History">
            <option value="1">Good (1)</option>
            <option value="0">Bad (0)</option>
        </select>

        <label>Property Area</label>
        <select name="Property_Area">
            <option value="2">Semiurban</option>
            <option value="1">Urban</option>
            <option value="0">Rural</option>
        </select>

        <button type="submit">Predict Loan Eligibility</button>
    </form>

    <!-- This shows the result sent back from Flask -->
    {% if prediction_text %}
    <div class="result">{{ prediction_text }}</div>
    {% endif %}

</div>
</body>
</html>
