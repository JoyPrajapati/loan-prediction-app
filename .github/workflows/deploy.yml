name: Build and Deploy Loan Prediction App

# Trigger — run this pipeline on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  build:
    # Use a fresh Ubuntu machine hosted by GitHub (free!)
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Download your code onto the GitHub machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 — Log into Docker Hub so we can push our image
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 — Build the Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/loan-prediction-app:latest .

      # Step 4 — Push image to Docker Hub (cloud storage for Docker images)
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/loan-prediction-app:latest