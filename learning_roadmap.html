<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>body{margin:0;padding:16px;background:white;}</style></head>
<body>
<svg width="100%" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,sans-serif">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text font-size="16" font-weight="bold" x="340" y="28" text-anchor="middle" fill="#222">Your MLOps / DevOps learning roadmap</text>

<rect x="40" y="48" width="600" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" x="340" y="74" text-anchor="middle" fill="#085041">Phase 1 DONE — Understand and fix the app</text>
<text font-size="12" x="340" y="96" text-anchor="middle" fill="#0F6E56">Read code, found 3 bugs, fixed app.py + index.html, app runs locally</text>
<text font-size="12" x="340" y="114" text-anchor="middle" fill="#0F6E56">Learned: Flask routes, HTML forms, how browser talks to Python server</text>
<text font-size="12" x="340" y="132" text-anchor="middle" fill="#0F6E56">Learned: venv vs Docker, Python version management, conda</text>
<line x1="340" y1="148" x2="340" y2="168" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="168" width="600" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" x="340" y="194" text-anchor="middle" fill="#085041">Phase 2 DONE — Docker</text>
<text font-size="12" x="340" y="216" text-anchor="middle" fill="#0F6E56">Created Dockerfile, requirements.txt, .dockerignore, built Docker image</text>
<text font-size="12" x="340" y="234" text-anchor="middle" fill="#0F6E56">Learned: image vs container, layers, caching, port exposure</text>
<text font-size="12" x="340" y="252" text-anchor="middle" fill="#0F6E56">The works-on-my-machine problem is solved forever</text>
<line x1="340" y1="268" x2="340" y2="288" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="288" width="600" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text font-size="14" font-weight="bold" x="340" y="314" text-anchor="middle" fill="#633806">Phase 3 — GitHub + CI/CD  (YOU ARE HERE)</text>
<text font-size="12" x="340" y="336" text-anchor="middle" fill="#854F0B">Pushed code to GitHub, created GitHub Actions pipeline</text>
<text font-size="12" x="340" y="356" text-anchor="middle" fill="#854F0B">Pipeline: git push triggers auto build Docker and push to Docker Hub</text>
<text font-size="12" x="340" y="376" text-anchor="middle" fill="#854F0B">Next: watch pipeline run, fix errors, confirm image on Docker Hub</text>
<line x1="340" y1="388" x2="340" y2="408" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="408" width="600" height="100" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" x="340" y="434" text-anchor="middle" fill="#2C2C2A">Phase 4 — Cloud Deployment</text>
<text font-size="12" x="340" y="456" text-anchor="middle" fill="#5F5E5A">Deploy Docker image to a real cloud server</text>
<text font-size="12" x="340" y="476" text-anchor="middle" fill="#5F5E5A">Options: AWS EC2, Google Cloud Run, Railway, Render</text>
<text font-size="12" x="340" y="496" text-anchor="middle" fill="#5F5E5A">Result: a real URL anyone in the world can open on any device</text>
<line x1="340" y1="508" x2="340" y2="528" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="528" width="600" height="100" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" x="340" y="554" text-anchor="middle" fill="#2C2C2A">Phase 5 — Kubernetes</text>
<text font-size="12" x="340" y="576" text-anchor="middle" fill="#5F5E5A">Orchestrate containers: auto scaling, self healing, load balancing</text>
<text font-size="12" x="340" y="596" text-anchor="middle" fill="#5F5E5A">What happens when 10,000 users hit your app at once</text>
<text font-size="12" x="340" y="616" text-anchor="middle" fill="#5F5E5A">Tools: kubectl and minikube locally, then EKS or GKE on cloud</text>
<line x1="340" y1="628" x2="340" y2="648" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="648" width="600" height="100" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" x="340" y="674" text-anchor="middle" fill="#2C2C2A">Phase 6 — MLOps specific tools</text>
<text font-size="12" x="340" y="696" text-anchor="middle" fill="#5F5E5A">MLflow: track experiments, compare models, version ML models</text>
<text font-size="12" x="340" y="716" text-anchor="middle" fill="#5F5E5A">DVC: version control for datasets and models, like Git but for data</text>
<text font-size="12" x="340" y="736" text-anchor="middle" fill="#5F5E5A">This is what separates a DevOps engineer from an MLOps engineer</text>

<rect x="40" y="768" width="600" height="74" rx="8" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
<text font-size="14" font-weight="bold" x="340" y="794" text-anchor="middle" fill="#222">The wisdom behind this order</text>
<text font-size="12" x="340" y="816" text-anchor="middle" fill="#555">Code then Container then Version Control then Automation then Scale then Monitor</text>
<text font-size="12" x="340" y="836" text-anchor="middle" fill="#555">Every phase solves a real problem the previous phase creates. Nothing is random.</text>
</svg>
</body></html>
